<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: white;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .error {
      color: #ef4444;
      margin-top: 10px;
    }

    .success {
      color: #22c55e;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Register</h2>

    <form id="registerForm">
      <input id="name" placeholder="Name" required />
      <input id="email" placeholder="Email" required />
      <input id="phone" placeholder="Phone" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>

    <div id="msg"></div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();

      const msg = document.getElementById("msg");
      msg.innerText = "";

      try {
        const res = await fetch("http://localhost:5000/api/users/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            email,
            phone,
            password   // ✅ CRITICAL FIX
          })
        });

        const data = await res.json();

        console.log("REGISTER RESPONSE:", data);

        if (!res.ok) {
          msg.innerHTML = `<span class="error">${data.message}</span>`;
          return;
        }

        msg.innerHTML = `<span class="success">Registered Successfully ✅</span>`;

        // redirect after 1.5 sec
        setTimeout(() => {
          window.location.href = "/index.html";
        }, 1500);

      } catch (err) {
        console.log(err);
        msg.innerHTML = `<span class="error">Server error</span>`;
      }
    });
  </script>

</body>
</html>
