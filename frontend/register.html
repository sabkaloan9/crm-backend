<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Register - CRM SaaS</title>

<style>
  body {
    font-family: Arial;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    color: white;
  }

  .box {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
    outline: none;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
  }

  button:disabled {
    background: #64748b;
  }

  .error {
    color: #ef4444;
    margin-top: 10px;
  }

  .success {
    color: #22c55e;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Create Account</h2>

  <form id="registerForm">
    <input id="name" placeholder="Full Name" required />
    <input id="email" type="email" placeholder="Email" required />
    <input id="phone" placeholder="Phone" required />
    <input id="password" type="password" placeholder="Password" required />

    <button type="submit" id="btn">Register</button>
  </form>

  <div id="msg"></div>
</div>

<script>
const API = "https://crm-backend-9kb2.onrender.com";

const form = document.getElementById("registerForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");

// =====================
// REGISTER HANDLER
// =====================
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  msg.innerHTML = "";

  // =====================
  // VALIDATION (SAAS LEVEL)
  // =====================
  if (password.length < 6) {
    msg.innerHTML = `<span class="error">Password must be at least 6 characters</span>`;
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating account...";

  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        phone,
        password
      })
    });

    const data = await res.json();

    console.log("REGISTER RESPONSE:", data);

    if (!res.ok) {
      msg.innerHTML = `<span class="error">${data.message || "Registration failed"}</span>`;
      return;
    }

    msg.innerHTML = `<span class="success">Account created successfully ✅</span>`;

    // =====================
    // REDIRECT TO LOGIN
    // =====================
    setTimeout(() => {
      window.location.href = "/index.html";
    }, 1200);

  } catch (err) {
    console.error("REGISTER ERROR:", err);
    msg.innerHTML = `<span class="error">Server not reachable / API error</span>`;
  } finally {
    btn.disabled = false;
    btn.innerText = "Register";
  }
});
</script>

</body>
</html>
