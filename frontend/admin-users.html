<!DOCTYPE html>
<html>
<head>
  <title>Admin Users</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #333;
      color: white;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
    }

    .admin {
      background: green;
      color: white;
    }

    .make-admin {
      background: #007bff;
      color: white;
    }

    .back {
      margin-bottom: 15px;
      background: #444;
      color: white;
    }
  </style>
</head>
<body>

<h2>👥 User Management</h2>

<button class="back" onclick="goBack()">⬅ Back</button>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="userTable"></tbody>
</table>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

// 🔐 AUTH CHECK
if (!token || !user?.isAdmin) {
  alert("Access denied");
  window.location.href = "dashboard.html";
}

// =====================
// LOAD USERS
// =====================
async function loadUsers() {
  try {
    const res = await fetch("https://crm-backend-9kb2.onrender.com/api/users", {
      headers: { token }
    });

    const users = await res.json();

    const table = document.getElementById("userTable");
    table.innerHTML = "";

    users.forEach(u => {
      table.innerHTML += `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>${u.isAdmin ? "Admin" : "User"}</td>
          <td>
            ${
              u.isAdmin
                ? `<button class="admin">Admin</button>`
                : `<button class="make-admin" onclick="makeAdmin('${u._id}')">Make Admin</button>`
            }
          </td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
    alert("Error loading users");
  }
}

// =====================
// MAKE ADMIN
// =====================
async function makeAdmin(id) {
  const res = await fetch(
    `https://crm-backend-9kb2.onrender.com/api/users/make-admin/${id}`,
    {
      method: "PUT",
      headers: { token }
    }
  );

  if (res.ok) {
    alert("User promoted to admin");
    loadUsers();
  } else {
    alert("Failed to update user");
  }
}

// =====================
// BACK
// =====================
function goBack() {
  window.location.href = "dashboard.html";
}

loadUsers();
</script>

</body>
</html>
