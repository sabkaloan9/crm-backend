<!DOCTYPE html>
<html>
<head>
  <title>User Management</title>
</head>
<body>

<h2>User Management</h2>

<button onclick="goBack()">Back</button>
<button onclick="logout()">Logout</button>

<input type="text" id="search" placeholder="Search user..."><br><br>

<table border="1" width="100%">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

// protect page
if (!token) {
  window.location.href = "login.html";
}

if (!user || !user.isAdmin) {
  alert("Admin only");
  window.location.href = "dashboard.html";
}

// load users
async function loadUsers() {
  const res = await fetch("https://crm-backend-9kb2.onrender.com/api/users", {
    headers: {
      token: token
    }
  });

  const users = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  users.forEach(u => {
    table.innerHTML += `
      <tr>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.isAdmin ? "Admin" : "User"}</td>
        <td>
          ${
            !u.isAdmin
              ? `<button onclick="makeAdmin('${u._id}')">Make Admin</button>`
              : "✔"
          }
        </td>
      </tr>
    `;
  });
}

// make admin
async function makeAdmin(id) {
  await fetch(`https://crm-backend-9kb2.onrender.com/api/users/make-admin/${id}`, {
    method: "PUT",
    headers: {
      token: token
    }
  });

  loadUsers();
}

// search
document.getElementById("search").addEventListener("input", function () {
  const val = this.value.toLowerCase();
  const rows = document.querySelectorAll("tbody tr");

  rows.forEach(r => {
    r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

// nav
function goBack() {
  window.location.href = "dashboard.html";
}

// logout
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

loadUsers();
</script>

</body>
</html>
