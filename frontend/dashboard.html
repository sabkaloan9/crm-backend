<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CRM SaaS</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 250px;
      background: #0f172a;
      padding: 20px;
      border-right: 1px solid #1f2937;
    }

    .menu button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: none;
      border: none;
      color: #cbd5e1;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
    }

    .menu button:hover {
      background: #1e293b;
      color: white;
    }

    .main { flex: 1; padding: 20px; }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid #1f2937;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      border-radius: 10px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #1f2937;
    }

    tr:hover { background: #111827; }

    input, select {
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: white;
    }

    .btn-blue {
      background: #3b82f6;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }

    /* LOADER */
    #loader {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #loader div {
      width: 50px;
      height: 50px;
      border: 5px solid #3b82f6;
      border-top: 5px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* MODAL */
    #loanModal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
    }

    #loanModal div {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      width:300px;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2 style="color:#38bdf8;">CRM SaaS</h2>

    <div class="menu">
      <button onclick="showSection('dashboard')">📊 Dashboard</button>
      <button onclick="showSection('users')">👤 Users</button>
      <button onclick="showSection('loans')">💰 Loans</button>
      <button onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="card">
      <h3>Analytics</h3>

      <p>Approved: <span id="approvedCount">0</span></p>
      <p>Pending: <span id="pendingCount">0</span></p>
      <p>Rejected: <span id="rejectedCount">0</span></p>

      <canvas id="loanChart" height="100"></canvas>

      <br>
      <button onclick="exportCSV()" class="btn-blue">📄 Export CSV</button>
    </div>

    <!-- USERS -->
    <div id="usersSection" class="card" style="display:none;">
      <h3>Users</h3>
      <table>
        <tbody id="usersTable"></tbody>
      </table>
    </div>

    <!-- LOANS -->
    <div id="loansSection" class="card" style="display:none;">
      <h3>Loans</h3>

      <div style="margin:10px 0; display:flex; gap:10px;">
        <input id="searchInput" placeholder="Search..." onkeyup="filterLoans()">
        <select id="statusFilter" onchange="filterLoans()">
          <option value="">All</option>
          <option value="approved">Approved</option>
          <option value="pending">Pending</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <button id="addLoanBtn" onclick="openLoanModal()" class="btn-blue">
        ➕ Add Loan
      </button>

      <table>
        <tbody id="loansTable"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="loanModal">
  <div>
    <h3>Add Loan</h3>
    <input id="loanAmount" placeholder="Amount"><br><br>
    <input id="loanInterest" placeholder="Interest"><br><br>
    <input id="loanTenure" placeholder="Tenure"><br><br>

    <button onclick="submitLoan()" class="btn-blue">Submit</button>
    <button onclick="closeLoanModal()">Cancel</button>
  </div>
</div>

<!-- LOADER -->
<div id="loader"><div></div></div>

<script src="script.js"></script>

</body>
</html>
