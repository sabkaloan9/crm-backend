<!DOCTYPE html>
<html>
<head>
  <title>CRM</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<h2>Dashboard</h2>

<input id="search" placeholder="Search...">
<pre id="data"></pre>

<div id="notify" style="position:fixed;top:10px;right:10px;background:black;color:white;padding:10px;display:none;"></div>

<script>
const API = "https://crm-backend-9kb2.onrender.com";
const token = localStorage.getItem("token");

if (!token) window.location.href = "login.html";

const socket = io(API);

// SEARCH
search.oninput = async () => {
  const res = await fetch(API + "/api/users/search?q=" + search.value, {
    headers: { token }
  });

  const data = await res.json();
  document.getElementById("data").innerText = JSON.stringify(data, null, 2);
};

// REALTIME
socket.on("userUpdated", () => search.oninput());
socket.on("userDeleted", () => search.oninput());

// NOTIFY
socket.on("notify", (n) => {
  notify.innerText = n.msg;
  notify.style.display = "block";
  notify.style.background = n.type === "error" ? "red" : "green";

  setTimeout(() => notify.style.display = "none", 2000);
});
</script>

</body>
</html>
