<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }
.app { display:flex; }

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#0f172a;
  padding:20px;
  height:100vh;
}
.sidebar h2 { color:#38bdf8; }

.sidebar button {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#1e293b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.main { flex:1; padding:20px; }

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.card {
  background:#111827;
  padding:20px;
  border-radius:12px;
}

/* TABLE */
table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#111827;
}
th, td {
  padding:12px;
  border-bottom:1px solid #1f2937;
}

/* BUTTONS */
button.action {
  margin-right:5px;
  padding:5px 8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.approve { background:#16a34a; }
.reject { background:#dc2626; }

.admin-only { display:inline-block; }
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>CRM SaaS</h2>

    <!-- ✅ REQUIRED (FIXES ERROR) -->
    <div>
      👤 <span id="userName">User</span><br>
      🔐 Role: <span id="userRole">-</span>
    </div>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Dashboard</h2>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">Total Loans: <span id="totalLoans">0</span></div>
      <div class="card">Approved: <span id="approvedCount">0</span></div>
      <div class="card">Pending: <span id="pendingCount">0</span></div>
      <div class="card">Rejected: <span id="rejectedCount">0</span></div>
      <div class="card">Users: <span id="totalUsers">0</span></div>
    </div>

    <!-- CHART -->
    <canvas id="chart"></canvas>

    <!-- LOANS -->
    <h3>Loans</h3>

    <button onclick="createLoan()">➕ Create Loan</button>

    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
          <th class="admin-only">Action</th>
        </tr>
      </thead>
      <tbody id="loanTable"></tbody>
    </table>

  </div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
