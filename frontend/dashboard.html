<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<p id="welcome"></p>

<button id="adminBtn" onclick="goToUsers()">User Management</button>
<button onclick="logout()">Logout</button>

<pre id="output"></pre>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

// 🔐 check login
if (!token) {
  window.location.href = "login.html";
}

// 👤 show user
if (user) {
  document.getElementById("welcome").innerText =
    "Welcome " + user.name + (user.isAdmin ? " (Admin)" : "");
}

// 🔒 hide admin button
if (!user || !user.isAdmin) {
  document.getElementById("adminBtn").style.display = "none";
}

// load dashboard
async function loadDashboard() {
  const res = await fetch("https://crm-backend-9kb2.onrender.com/api/dashboard", {
    headers: {
      token: token
    }
  });

  if (res.status === 401) {
    alert("Session expired");
    logout();
    return;
  }

  if (res.status === 403) {
    document.getElementById("output").innerText = "Access restricted";
    return;
  }

  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// nav
function goToUsers() {
  window.location.href = "admin-users.html";
}

// logout
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

loadDashboard();
</script>

</body>
</html>
