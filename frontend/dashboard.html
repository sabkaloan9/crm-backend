<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }
.app { display:flex; }

.sidebar {
  width:220px;
  background:#0f172a;
  padding:20px;
  height:100vh;
}
.sidebar h2 { color:#38bdf8; }

.sidebar button {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#1e293b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.main { flex:1; padding:20px; }

.cards {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.card {
  background:#111827;
  padding:20px;
  border-radius:12px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#111827;
}
th, td {
  padding:12px;
  border-bottom:1px solid #1f2937;
}

.admin-only { display:inline-block; }

input, select {
  padding:8px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>CRM SaaS</h2>

    <div>
      👤 <span id="userName">User</span><br>
      🔐 Role: <span id="userRole">-</span>
    </div>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Dashboard</h2>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">Total Loans: <span id="totalLoans">0</span></div>
      <div class="card">Approved: <span id="approvedCount">0</span></div>
      <div class="card">Pending: <span id="pendingCount">0</span></div>
      <div class="card">Rejected: <span id="rejectedCount">0</span></div>
      <div class="card">Users: <span id="totalUsers">0</span></div>
    </div>

    <!-- CHART -->
    <canvas id="chart"></canvas>

    <!-- FILTERS -->
    <div style="margin:15px 0; display:flex; gap:10px; flex-wrap:wrap;">
      <input id="searchInput" placeholder="Search user..." />
      <select id="statusFilter">
        <option value="">All</option>
        <option value="approved">Approved</option>
        <option value="pending">Pending</option>
        <option value="rejected">Rejected</option>
      </select>
      <button onclick="exportCSV()">📄 Export CSV</button>
    </div>

    <!-- LOANS -->
    <h3>Loans</h3>

    <button onclick="createLoan()">➕ Create Loan</button>

    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
          <th class="admin-only">Action</th>
        </tr>
      </thead>
      <tbody id="loanTable"></tbody>
    </table>

    <!-- PAGINATION -->
    <div style="margin-top:15px;">
      <button onclick="prevPage()">⬅ Prev</button>
      <span id="pageInfo"></span>
      <button onclick="nextPage()">Next ➡</button>
    </div>

  </div>
</div>

<script src="script.js?v=5"></script>
</body>
</html>
