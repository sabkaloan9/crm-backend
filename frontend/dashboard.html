<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 350px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    th {
      background: #34495e;
      color: white;
    }

    tr:hover {
      background: #f1f1f1;
    }

    button {
      padding: 5px 10px;
      margin-right: 5px;
      cursor: pointer;
    }

    .view { background: #3498db; color: white; }
    .delete { background: #e74c3c; color: white; }
  </style>
</head>
<body>

<div class="header">
  CRM Dashboard
</div>

<div class="container">

  <!-- 🔍 LIVE SEARCH -->
  <input 
    type="text" 
    id="search" 
    placeholder="Search Lead ID / Mobile / Email / PAN / Loan No"
  />

  <!-- 📊 TABLE -->
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Lead ID</th>
        <th>Mobile</th>
        <th>Email</th>
        <th>PAN</th>
        <th>Loan No</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
const API = "https://crm-backend-9kb2.onrender.com";
let timeout = null;

// 🔥 LIVE SEARCH (AUTO)
document.getElementById("search").addEventListener("input", function () {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    searchCustomer(this.value);
  }, 500); // delay for typing
});

// 🔍 API CALL
async function searchCustomer(q) {
  if (!q) {
    document.getElementById("tableBody").innerHTML = "";
    return;
  }

  try {
    const res = await fetch(`${API}/api/users/search?q=${q}`);
    const data = await res.json();
    renderTable(data);
  } catch (err) {
    console.error(err);
  }
}

// 📊 RENDER TABLE
function renderTable(users) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  if (!users.length) {
    tbody.innerHTML = "<tr><td colspan='7'>No data found</td></tr>";
    return;
  }

  users.forEach(u => {
    tbody.innerHTML += `
      <tr>
        <td>${u.name || ""}</td>
        <td>${u.leadId || ""}</td>
        <td>${u.mobile || ""}</td>
        <td>${u.email || ""}</td>
        <td>${u.pan || ""}</td>
        <td>${u.loanNo || ""}</td>
        <td>
          <button class="view" onclick='viewUser(${JSON.stringify(u)})'>View</button>
          <button class="delete" onclick='deleteUser("${u._id}")'>Delete</button>
        </td>
      </tr>
    `;
  });
}

// 👁 VIEW USER
function viewUser(user) {
  alert(
    "Name: " + user.name + "\n" +
    "Mobile: " + user.mobile + "\n" +
    "Email: " + user.email + "\n" +
    "PAN: " + user.pan + "\n" +
    "Loan: " + user.loanNo
  );
}

// ❌ DELETE USER (frontend only for now)
function deleteUser(id) {
  alert("Delete API next step 🔥\nUser ID: " + id);
}
</script>

</body>
</html>
