<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CRM Login</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: white;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:disabled {
      background: #64748b;
    }

    .error {
      color: #ef4444;
      margin-top: 10px;
      font-size: 14px;
    }

    .success {
      color: #22c55e;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>

</head>

<body>

  <div class="box">
    <h2>CRM Login</h2>

```
<form id="loginForm">
  <input id="email" type="email" placeholder="Email" required />
  <input id="password" type="password" placeholder="Password" required />
  <button type="submit" id="loginBtn">Login</button>
</form>

<div id="msg"></div>
```

  </div>

  <script>
    // =====================
    // ✅ FINAL PRODUCTION API
    // =====================
    const API = "https://crm-backend-sigma-lime.vercel.app";

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");

    // =====================
    // AUTO LOGIN
    // =====================
    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("token");
      if (token) {
        window.location.href = "/dashboard.html";
      }
    });

    // =====================
    // LOGIN HANDLER
    // =====================
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      msg.innerHTML = "";

      loginBtn.innerText = "Logging in...";
      loginBtn.disabled = true;

      try {
        const res = await fetch(`${API}/api/users/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        let data;

        const contentType = res.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          data = await res.json();
        } else {
          const text = await res.text();
          throw new Error(text || "Server error");
        }

        console.log("LOGIN RESPONSE:", data);

        if (!res.ok) {
          msg.innerHTML = `<span class="error">${data.message || "Invalid credentials"}</span>`;
          return;
        }

        if (!data.token) {
          msg.innerHTML = `<span class="error">Token missing from server</span>`;
          return;
        }

        // =====================
        // SAVE AUTH
        // =====================
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        msg.innerHTML = `<span class="success">Login successful ✅</span>`;

        // =====================
        // REDIRECT
        // =====================
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 800);

      } catch (err) {
        console.error("LOGIN ERROR:", err);
        msg.innerHTML = `<span class="error">Server not reachable</span>`;
      } finally {
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
      }
    });

    // =====================
    // LOGOUT (GLOBAL)
    // =====================
    function logout() {
      localStorage.clear();
      window.location.href = "/index.html";
    }
  </script>

</body>
</html>
